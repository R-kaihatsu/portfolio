<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Cafe Hinataへのお問い合わせ送信完了ページ">
  <title>お問い合わせありがとうございました | Cafe Hinata</title>
  <link rel="stylesheet" href="cafe-styles.css">
  <link rel="stylesheet" href="my-signature.css">
  <style>
    .thanks-page {
      min-height: 100vh;
      min-height: 100svh;
      padding: 32px 18px;
      display: grid;
      place-items: center;
      background:
        linear-gradient(rgba(251, 247, 237, 0.9), rgba(251, 247, 237, 0.96)),
        url("https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?auto=format&fit=crop&w=1800&q=85")
        center / cover no-repeat;
    }

    .thanks-card {
      width: min(100%, 640px);
      padding: clamp(32px, 7vw, 56px);
      text-align: center;
      background: var(--color-white);
      border: 1px solid var(--color-line);
      border-radius: var(--radius);
      box-shadow: var(--shadow-soft);
    }

    .thanks-card .section-kicker {
      margin-bottom: 12px;
    }

    .thanks-card h1 {
      margin: 0;
      color: var(--color-brown);
      font-family: Georgia, "Hiragino Mincho ProN", "Yu Mincho", serif;
      font-size: clamp(2rem, 7vw, 3rem);
      line-height: 1.35;
      letter-spacing: 0;
      word-break: keep-all;
      overflow-wrap: break-word;
    }

    .thanks-card p {
      margin: 18px auto 0;
      max-width: 460px;
      color: var(--color-muted);
      line-height: 1.9;
    }

    .thanks-card .button {
      margin-top: 28px;
    }
  </style>
</head>
<body>
  <main class="thanks-page">
    <section class="thanks-card" aria-labelledby="thanks-title">
      <p class="section-kicker">Thank You</p>
      <h1 id="thanks-title">お問い合わせありがとうございました</h1>
      <p>メッセージを正常に送信しました。内容を確認次第、折り返しご連絡いたします。</p>
      <a class="button button-primary btn-tactile" href="cafe-template.html">トップページに戻る</a>
    </section>
  </main>
</body>
</html>
